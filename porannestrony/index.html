<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poranne Strony</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --paper:#F5F1E8;
  --paper-dim:#EDE7D8;
  --ink:#221E1A;
  --ink-soft:#6B655C;
  --line:#D9D1BE;
  --moss:#4C6B4F;
  --moss-soft:#B9CBB4;
  --clay:#C1622D;
  --clay-soft:#EFC9AC;
  --plum:#5B4B8A;
  --plum-soft:#D3C9EA;
  --rose:#AE3A5D;
  --rose-soft:#EAC0CD;
  --slate:#5A6472;
  --slate-soft:#CBD2D9;
}

*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
}
#app{
  max-width:1080px;
  margin:0 auto;
  padding:32px 20px 64px;
}

.masthead{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  border-bottom:2px solid var(--ink);
  padding-bottom:14px;
  margin-bottom:0;
}
.masthead h1{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:28px;
  margin:0;
  letter-spacing:-0.01em;
}
.masthead .sub{
  font-size:12px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--ink-soft);
}

/* streak banner — pod kreską masthead */
.streak-banner{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 4px;
  margin-bottom:24px;
  border-bottom:1px solid var(--line);
}
.streak-flame{font-size:22px;}
.streak-num{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:18px;
}
.streak-msg{
  font-size:13px;
  color:var(--ink-soft);
}

/* layout: sidebar + main */
.app-shell{
  display:flex;
  gap:32px;
  align-items:flex-start;
}
.sidebar{
  width:260px;
  flex:0 0 auto;
  position:sticky;
  top:24px;
}
.main{
  flex:1;
  min-width:0;
}
@media (max-width:760px){
  .app-shell{flex-direction:column;gap:20px;}
  .sidebar{width:100%;position:static;}
  #app{padding:20px 14px 48px;}
  .masthead h1{font-size:22px;}
  .dash-head{flex-direction:column;gap:16px;}
  .grid4{grid-template-columns:repeat(2,1fr);}
  .barchart{gap:8px;overflow-x:auto;padding-bottom:4px;}
  .barcol{flex:0 0 52px;}
  .trio{gap:8px;}
  .nav-row{gap:8px;}
  .nav-date{min-width:auto;font-size:13px;}
  .cal-cell{height:34px;}
  .month-stats{grid-template-columns:repeat(2,1fr);}
}
@media (max-width:400px){
  .grid4{grid-template-columns:1fr 1fr;}
  .cal-cell{height:30px;font-size:10.5px;}
}

/* calendar */
.calendar{
  background:var(--paper-dim);
  border:1px solid var(--line);
  border-radius:10px;
  padding:16px;
}
.cal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.cal-month{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:14.5px;
  text-transform:capitalize;
}
.cal-nav{
  width:26px;height:26px;
  border-radius:6px;
  border:1px solid var(--line);
  background:var(--paper);
  cursor:pointer;
  font-size:13px;
  color:var(--ink);
}
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7, minmax(0,1fr));
  gap:3px;
}
.cal-weekdays{
  margin-bottom:4px;
  font-size:10px;
  text-transform:uppercase;
  color:var(--ink-soft);
  text-align:center;
}
.cal-cell{
  width:100%;
  height:30px;
  min-width:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11.5px;
  border-radius:6px;
  color:var(--ink-soft);
  box-sizing:border-box;
}
.cal-cell.empty{visibility:hidden;}
.cal-cell.future{opacity:0.35;}
.cal-cell.today{box-shadow:inset 0 0 0 1.5px var(--ink);}
.cal-cell[data-action]{cursor:pointer;}
.cal-cell[data-action]:hover{box-shadow:inset 0 0 0 1.5px var(--ink);}
.cal-cell.has-entry.under{background:var(--clay-soft);color:var(--ink);font-weight:600;}
.cal-cell.has-entry.over{background:var(--clay);color:#fff;font-weight:700;}
.cal-legend{
  display:flex;
  flex-direction:column;
  gap:4px;
  margin-top:12px;
  font-size:10.5px;
  color:var(--ink-soft);
}
.cal-legend .row{display:flex;align-items:center;gap:6px;}
.cal-legend .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
.cal-legend .dot.under{background:var(--clay-soft);}
.cal-legend .dot.over{background:var(--clay);}

/* view switcher */
.view-switch{
  display:flex;
  gap:4px;
  margin-bottom:20px;
  border-bottom:1px solid var(--line);
}
.view-btn{
  padding:9px 14px;
  font-size:12.5px;
  font-weight:600;
  color:var(--ink-soft);
  background:transparent;
  border:none;
  border-bottom:2px solid transparent;
  cursor:pointer;
  margin-bottom:-1px;
}
.view-btn.active{
  color:var(--ink);
  border-bottom-color:var(--clay);
}
.view-switch .spacer{flex:1;}
.add-btn{
  align-self:center;
  margin-bottom:8px;
  padding:8px 14px;
  border:1px dashed var(--ink-soft);
  border-radius:6px;
  cursor:pointer;
  background:transparent;
  color:var(--ink-soft);
  font-size:12.5px;
  font-weight:600;
}
.add-btn:hover{color:var(--ink);border-color:var(--ink);}

/* add entry form */
.entry-form{
  background:var(--paper-dim);
  border:1px solid var(--line);
  border-radius:10px;
  padding:18px;
  margin-bottom:24px;
}
.entry-form label{
  display:block;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--ink-soft);
  margin-bottom:5px;
}
.entry-form input[type=date]{
  font-family:'Inter';
  padding:8px 10px;
  border:1px solid var(--line);
  border-radius:6px;
  background:var(--paper);
  color:var(--ink);
  margin-bottom:8px;
  font-size:14px;
}
.edit-note{
  font-size:12px;
  color:var(--clay);
  margin-bottom:14px;
  font-weight:600;
}
.textarea-wrap{
  position:relative;
  overflow:hidden;
  border-radius:6px;
}
.entry-form textarea{
  width:100%;
  min-height:180px;
  font-family:'Inter';
  font-size:14.5px;
  line-height:1.55;
  padding:12px;
  border:1px solid var(--line);
  border-radius:6px;
  background:var(--paper);
  color:var(--ink);
  resize:vertical;
  display:block;
}
.word-counter-row{
  display:flex;
  justify-content:flex-end;
  margin-top:6px;
}
#word-counter{
  font-size:11.5px;
  color:var(--ink-soft);
}
#word-counter.over-limit{color:var(--moss);font-weight:700;}
.form-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:12px;
}
.btn{
  font-family:'Inter';
  font-weight:600;
  font-size:13px;
  padding:9px 18px;
  border-radius:6px;
  border:1px solid var(--ink);
  background:var(--ink);
  color:var(--paper);
  cursor:pointer;
}
.btn.secondary{
  background:transparent;
  color:var(--ink-soft);
  border-color:var(--line);
}
.btn:disabled{opacity:0.5;cursor:default;}

/* confetti */
.confetti-layer{
  position:absolute;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:5;
}
.confetti-piece{
  position:absolute;
  top:-12px;
  width:7px;height:12px;
  opacity:0.9;
  border-radius:2px;
  animation:confetti-fall linear forwards;
}
@keyframes confetti-fall{
  to{ transform: translateY(240px) rotate(360deg); opacity:0; }
}

/* empty state */
.empty{
  text-align:center;
  padding:60px 20px;
  color:var(--ink-soft);
}
.empty .big{font-size:40px;margin-bottom:10px;}
.empty h2{font-family:'Fraunces',serif;color:var(--ink);font-weight:600;margin:6px 0;}

/* loading */
.loading{
  text-align:center;
  padding:60px 20px;
  color:var(--ink-soft);
  font-size:14px;
}

/* dashboard */
.dash-head{
  display:flex;
  justify-content:space-between;
  margin-bottom:26px;
  gap:24px;
  flex-wrap:wrap;
}
.headline-block{flex:1;min-width:220px;}
.eyebrow{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--ink-soft);
  margin-bottom:6px;
}
.headline{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:26px;
  display:flex;
  align-items:center;
  gap:10px;
}
.headline .emo{font-size:28px;}

hr.rule{border:none;border-top:1px solid var(--ink);margin:28px 0 22px;}

.section-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--ink-soft);
  margin-bottom:14px;
}

.barchart{
  display:flex;
  align-items:flex-end;
  gap:14px;
  height:130px;
  margin-bottom:10px;
}
.barcol{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  flex:1;
  height:100%;
  justify-content:flex-end;
}
.bar{
  width:100%;
  max-width:38px;
  border-radius:4px 4px 2px 2px;
  transition:height .4s ease;
}
.barcol .emo{font-size:18px;}
.barcol .lbl{
  font-size:10px;
  color:var(--ink-soft);
  text-align:center;
  max-width:64px;
}

.grid4{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:18px;
  margin-bottom:8px;
}
.gauge-card{
  background:var(--paper-dim);
  border:1px solid var(--line);
  border-radius:10px;
  padding:16px;
  text-align:center;
}
.gauge-title{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:17px;
}
.gauge-sub{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--ink-soft);
  margin-bottom:12px;
}
.donut{
  width:100px;height:100px;
  border-radius:50%;
  margin:0 auto;
  position:relative;
}
.donut::after{
  content:'';
  position:absolute;
  top:14px;left:14px;
  width:72px;height:72px;
  border-radius:50%;
  background:var(--paper-dim);
}

.trio{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-bottom:10px;
}
.trio-card{text-align:center;}
.trio-title{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:16px;
  margin-bottom:2px;
}

.nav-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  margin-top:32px;
}
.nav-btn{
  width:38px;height:38px;
  border-radius:8px;
  border:1px solid var(--ink);
  background:var(--paper);
  color:var(--ink);
  cursor:pointer;
  font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.nav-btn:disabled{opacity:0.3;cursor:default;}
.nav-date{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:15px;
  min-width:120px;
  text-align:center;
}

.err{
  color:var(--rose);
  font-size:13px;
  margin-top:10px;
}

/* entry text block */
.entry-text-block{
  background:var(--paper-dim);
  border:1px solid var(--line);
  border-radius:10px;
  padding:16px 18px;
  margin-bottom:26px;
}
.entry-text-block .content{
  font-family:'Fraunces',serif;
  font-size:15px;
  line-height:1.6;
  white-space:pre-wrap;
  max-height:220px;
  overflow-y:auto;
}
.entry-text-block .meta{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:11px;
  color:var(--ink-soft);
  margin-top:10px;
}

/* archive */
.archive-list{display:flex;flex-direction:column;gap:10px;}
.archive-item{
  display:flex;
  gap:12px;
  align-items:flex-start;
  background:var(--paper-dim);
  border:1px solid var(--line);
  border-radius:10px;
  padding:14px 16px;
  cursor:pointer;
}
.archive-item:hover{border-color:var(--ink);}
.archive-item .emo{font-size:22px;flex:0 0 auto;}
.archive-item .col{flex:1;min-width:0;}
.archive-item .row1{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:4px;
}
.archive-item .date{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:14.5px;
}
.archive-item .tags{
  font-size:11px;
  color:var(--ink-soft);
}
.archive-item .preview{
  font-size:13px;
  color:var(--ink-soft);
  overflow:hidden;
  text-overflow:ellipsis;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}
.archive-item .len{
  font-size:11px;
  color:var(--ink-soft);
  flex:0 0 auto;
  white-space:nowrap;
}

/* monthly stats */
.month-card{
  background:var(--paper-dim);
  border:1px solid var(--line);
  border-radius:10px;
  padding:18px 20px;
  margin-bottom:16px;
}
.month-card .month-title{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:18px;
  margin-bottom:14px;
  text-transform:capitalize;
}
.month-stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:16px;
}
.mstat-label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--ink-soft);
  margin-bottom:4px;
}
.mstat-val{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:16px;
  display:flex;
  align-items:center;
  gap:6px;
}

/* lock screen */
.lock-wrap{
  max-width:340px;
  margin:80px auto;
  background:var(--paper-dim);
  border:1px solid var(--line);
  border-radius:10px;
  padding:22px;
}
.lock-wrap label{
  display:block;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--ink-soft);
  margin-bottom:6px;
}
.lock-wrap input{
  width:100%;
  padding:10px;
  border:1px solid var(--line);
  border-radius:6px;
  background:var(--paper);
  font-family:'Inter';
  font-size:14px;
  margin-bottom:10px;
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// Adres Twojego Workera:
const API_ENDPOINT = "https://dziennik-proxy-2.weronnix.workers.dev";
const ENTRIES_ENDPOINT = API_ENDPOINT + "/entries";
const WORD_LIMIT = 750;
const PASS_KEY = 'dziennik-pass';

function getPassword(){ return localStorage.getItem(PASS_KEY) || ''; }
function setPassword(pw){ localStorage.setItem(PASS_KEY, pw); }

async function saveToStorage(){
  try{
    await fetch(ENTRIES_ENDPOINT, {
      method:'POST',
      headers:{'Content-Type':'application/json','x-dziennik-pass':getPassword()},
      body: JSON.stringify(state.entries)
    });
  }catch(e){
    console.warn('Nie udało się zapisać archiwum:', e);
  }
}

// zwraca true jeśli hasło poprawne i dane wczytane, false jeśli błędne hasło
async function loadFromStorage(pw){
  const res = await fetch(ENTRIES_ENDPOINT, { headers:{'x-dziennik-pass':pw} });
  if(res.status===401) return false;
  const parsed = await res.json();
  if(Array.isArray(parsed)) state.entries = parsed;
  return true;
}

const state = {
  entries: [],   // {id, date, text, status:'idle'|'loading'|'done'|'error', analysis, error}
  selectedId: null,
  formOpen: false,
  formDate: null,
  formText: '',
  confettiShown: false,
  view: 'day', // 'day' | 'archive' | 'monthly'
  calendarMonth: null, // 'YYYY-MM'
};

function uid(){ return Math.random().toString(36).slice(2,9); }

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDate(d){
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function wordCount(text){
  return (text||'').trim().split(/\s+/).filter(Boolean).length;
}

function monthKey(date){ return date.slice(0,7); }
function monthLabel(key){
  const dt = new Date(key+'-01T00:00:00');
  return dt.toLocaleDateString('pl-PL',{month:'long',year:'numeric'});
}

function mostCommon(list){
  const counts = {};
  list.forEach(x=>{
    if(!x || !x.label) return;
    const key = x.label;
    if(!counts[key]) counts[key] = {emoji:x.emoji, label:x.label, count:0};
    counts[key].count++;
  });
  const arr = Object.values(counts).sort((a,b)=>b.count-a.count);
  return arr[0] || null;
}

function groupByMonth(entries){
  const groups = {};
  entries.forEach(e=>{
    const k = monthKey(e.date);
    if(!groups[k]) groups[k] = [];
    groups[k].push(e);
  });
  return Object.keys(groups).sort().reverse().map(k=>({key:k, entries:groups[k]}));
}

function computeStreak(){
  const dates = new Set(state.entries.map(e=>e.date));
  let streak = 0;
  const cursor = new Date();
  const cursorStr = ()=> `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(cursor.getDate()).padStart(2,'0')}`;
  if(!dates.has(cursorStr())){
    cursor.setDate(cursor.getDate()-1);
  }
  while(dates.has(cursorStr())){
    streak++;
    cursor.setDate(cursor.getDate()-1);
  }
  return streak;
}

async function analyzeEntry(entry){
  entry.status='loading';
  render();
  const sys = `Jesteś analitykiem tekstu dziennika osobistego. Otrzymasz jeden wpis. Zwróć WYŁĄCZNIE poprawny JSON (bez markdown, bez komentarzy, bez żadnego innego tekstu) w dokładnie takim schemacie:
{
 "mood":{"emoji":"","label":""},
 "topic":{"emoji":"","label":""},
 "emotions":[{"emoji":"","label":"","value":0}],
 "topics_detail":[{"emoji":"","label":"","value":0}],
 "mindset":{"introvert_extrovert":0,"positive_negative":0,"certain_uncertain":0,"feeling_thinking":0},
 "time_orientation":{"past":0,"present":0,"future":0},
 "senses":{"sight":0,"hearing":0,"touch":0,"taste":0,"smell":0},
 "perspective":{"i":0,"we":0,"you":0,"they":0}
}
Zasady:
- Wszystkie etykiety (label) po polsku, krótkie (1-2 słowa).
- "mood" = jedna dominująca emocja całego wpisu, dobierz trafny emoji.
- "topic" = jeden dominujący temat wpisu, dobierz trafny emoji.
- "emotions": 4-6 emocji obecnych we wpisie z wartością intensywności 0-100 (najsilniejsza ok. 80-100).
- "topics_detail": 4-6 tematów poruszonych we wpisie z wartością istotności 0-100.
- "mindset.introvert_extrovert": 0=silnie introwertyczny ton, 100=silnie ekstrawertyczny.
- "mindset.positive_negative": 0=bardzo negatywny, 100=bardzo pozytywny.
- "mindset.certain_uncertain": 0=pełen niepewności, 100=pełen pewności.
- "mindset.feeling_thinking": 0=zdominowany myśleniem/analizą, 100=zdominowany odczuwaniem/emocjami.
- "time_orientation": trzy wartości 0-100 sumujące się orientacyjnie do 100, dominująca orientacja czasowa wpisu.
- "senses": które zmysły dominują w opisie (0-100 każdy, niekoniecznie sumują się do 100).
- "perspective": użycie perspektywy ja/my/ty/oni w tekście, wartości 0-100.
Analizuj wyłącznie na podstawie treści wpisu, bez zmyślania faktów.`;

  try{
    const response = await fetch(API_ENDPOINT,{
      method:"POST",
      headers:{"Content-Type":"application/json","x-dziennik-pass":getPassword()},
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        system: sys,
        messages:[{role:"user", content: entry.text}]
      })
    });
    const data = await response.json();
    if(!response.ok || data.type==='error'){
      console.error('Błąd API:', data);
      throw new Error(data?.error?.message || `HTTP ${response.status}`);
    }
    let raw = (data.content||[]).map(b=>b.text||"").join("").trim();
    raw = raw.replace(/^```json/,'').replace(/^```/,'').replace(/```$/,'').trim();
    const parsed = JSON.parse(raw);
    entry.analysis = parsed;
    entry.status='done';
  }catch(e){
    console.error('Analiza nie powiodła się:', e);
    entry.status='error';
    entry.error = 'Nie udało się przeanalizować wpisu: ' + e.message;
  }
  render();
  saveToStorage();
}

function addOrUpdateEntry(date, text){
  let entry = state.entries.find(e=>e.date===date);
  if(entry){
    entry.text = text;
    entry.status = 'idle';
    entry.analysis = null;
  } else {
    entry = {id:uid(), date, text, status:'idle'};
    state.entries.push(entry);
    state.entries.sort((a,b)=> a.date.localeCompare(b.date));
  }
  state.selectedId = entry.id;
  state.formOpen = false;
  state.view = 'day';
  render();
  saveToStorage();
  analyzeEntry(entry);
}

function selectedIndex(){
  return state.entries.findIndex(e=>e.id===state.selectedId);
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str||'';
  return div.innerHTML;
}

function bar(val, color){
  const h = Math.max(4, (val/100)*100);
  return `<div class="bar" style="height:${h}px;background:${color}"></div>`;
}

function donutStyle(val, colorA, colorB){
  const pct = Math.max(0,Math.min(100,val));
  return `background: conic-gradient(${colorA} 0% ${pct}%, ${colorB} ${pct}% 100%);`;
}

function fireConfetti(container){
  if(!container) return;
  const layer = document.createElement('div');
  layer.className='confetti-layer';
  container.appendChild(layer);
  const colors = ['var(--moss)','var(--clay)','var(--plum)','var(--rose)'];
  for(let i=0;i<40;i++){
    const p = document.createElement('span');
    p.className='confetti-piece';
    p.style.left = Math.random()*100+'%';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = (Math.random()*0.3)+'s';
    p.style.animationDuration = (1.1+Math.random()*0.7)+'s';
    layer.appendChild(p);
  }
  setTimeout(()=>{ layer.remove(); }, 2000);
}

function renderDashboard(entry){
  if(entry.status==='loading'){
    return `<div class="loading">Analizuję wpis…</div>`;
  }
  if(entry.status==='error'){
    return `<div class="loading">
      <div class="err">${entry.error}</div>
      <div style="margin-top:14px;"><button class="btn" data-action="retry" data-id="${entry.id}">Spróbuj ponownie</button></div>
    </div>`;
  }
  if(entry.status!=='done' || !entry.analysis) return '';
  const a = entry.analysis;

  const emoBars = (a.emotions||[]).map(e=>`
    <div class="barcol">
      ${bar(e.value, 'var(--moss)')}
      <div class="emo">${e.emoji||''}</div>
      <div class="lbl">${e.label||''}</div>
    </div>`).join('');

  const topicBars = (a.topics_detail||[]).map(t=>`
    <div class="barcol">
      ${bar(t.value, 'var(--clay)')}
      <div class="emo">${t.emoji||''}</div>
      <div class="lbl">${t.label||''}</div>
    </div>`).join('');

  const senseBars = ['sight','hearing','touch','taste','smell'];
  const senseLabels = {sight:'Wzrok',hearing:'Słuch',touch:'Dotyk',taste:'Smak',smell:'Zapach'};
  const senseEmo = {sight:'👀',hearing:'👂',touch:'✋',taste:'👅',smell:'👃'};
  const senseVals = a.senses||{};
  const senseBarsHtml = senseBars.map(k=>`
    <div class="barcol">
      ${bar(senseVals[k]||0, 'var(--slate)')}
      <div class="emo">${senseEmo[k]}</div>
      <div class="lbl">${senseLabels[k]}</div>
    </div>`).join('');

  const persp = a.perspective||{};
  const perspKeys=[['i','Ja','☝️'],['we','My','🤝'],['you','Ty','👉'],['they','Oni','🫱']];
  const perspHtml = perspKeys.map(([k,lbl,emo])=>`
    <div class="barcol">
      ${bar(persp[k]||0,'var(--plum)')}
      <div class="emo">${emo}</div>
      <div class="lbl">${lbl}</div>
    </div>`).join('');

  const m = a.mindset||{};
  const gauges = [
    {title:'Introwertyk', sub:'vs Ekstrawertyk', val:m.introvert_extrovert||0, cA:'var(--slate)', cB:'var(--clay)'},
    {title:'Pozytywne', sub:'vs Negatywne', val:m.positive_negative||0, cA:'var(--moss)', cB:'var(--rose)'},
    {title:'Pewne', sub:'vs Niepewne', val:m.certain_uncertain||0, cA:'var(--plum)', cB:'var(--clay)'},
    {title:'Odczuwanie', sub:'vs Myślenie', val:m.feeling_thinking||0, cA:'var(--rose)', cB:'var(--slate)'},
  ];
  const gaugesHtml = gauges.map(g=>`
    <div class="gauge-card">
      <div class="gauge-title">${g.title}</div>
      <div class="gauge-sub">${g.sub}</div>
      <div class="donut" style="${donutStyle(g.val, g.cA, g.cB)}"></div>
    </div>`).join('');

  const t = a.time_orientation||{};
  const trio = [
    {emo:'🕰️',lbl:'Przeszłość',val:t.past||0},
    {emo:'📍',lbl:'Teraźniejszość',val:t.present||0},
    {emo:'🔮',lbl:'Przyszłość',val:t.future||0},
  ];
  const trioHtml = trio.map(x=>`
    <div class="trio-card">
      <div style="font-size:22px;">${x.emo}</div>
      <div class="trio-title">${x.lbl}</div>
      <div class="lbl">${x.val}%</div>
    </div>`).join('');

  const wc = wordCount(entry.text);
  return `
    <div class="entry-text-block">
      <div class="content">${escapeHtml(entry.text)}</div>
      <div class="meta">
        <span>${wc} ${wc===1?'słowo':'słów'} · ${fmtDate(entry.date)}</span>
        <button class="btn secondary" data-action="edit-entry" data-date="${entry.date}">Edytuj wpis</button>
      </div>
    </div>

    <div class="dash-head">
      <div class="headline-block">
        <div class="eyebrow">Czujesz się głównie</div>
        <div class="headline"><span class="emo">${a.mood?.emoji||''}</span>${a.mood?.label||''}</div>
      </div>
      <div class="headline-block">
        <div class="eyebrow">Myślisz głównie o</div>
        <div class="headline"><span class="emo">${a.topic?.emoji||''}</span>${a.topic?.label||''}</div>
      </div>
    </div>

    <div class="section-label">Emocje we wpisie</div>
    <div class="barchart">${emoBars}</div>

    <div class="section-label">Tematy we wpisie</div>
    <div class="barchart">${topicBars}</div>

    <hr class="rule">
    <div class="section-label">Nastawienie podczas pisania</div>
    <div class="grid4">${gaugesHtml}</div>

    <hr class="rule">
    <div class="section-label">Orientacja czasowa</div>
    <div class="trio">${trioHtml}</div>

    <hr class="rule">
    <div class="section-label">Dominujący zmysł</div>
    <div class="barchart">${senseBarsHtml}</div>

    <hr class="rule">
    <div class="section-label">Ja i inni</div>
    <div class="barchart">${perspHtml}</div>
  `;
}

function renderArchive(){
  const entries = [...state.entries].sort((a,b)=> b.date.localeCompare(a.date));
  if(entries.length===0){
    return `<div class="empty">
      <div class="big">🗂️</div>
      <h2>Archiwum jest puste</h2>
      <div>Dodane wpisy pojawią się tutaj.</div>
    </div>`;
  }
  const items = entries.map(e=>{
    const mood = e.analysis?.mood;
    const topic = e.analysis?.topic;
    const emo = mood?.emoji || (e.status==='loading'?'⏳':(e.status==='error'?'⚠️':'📝'));
    const tags = [mood?.label, topic?.label].filter(Boolean).join(' · ');
    const wc = wordCount(e.text);
    return `<div class="archive-item" data-action="open-entry" data-id="${e.id}">
      <div class="emo">${emo}</div>
      <div class="col">
        <div class="row1">
          <div class="date">${fmtDate(e.date)}</div>
        </div>
        <div class="tags">${tags||(e.status==='loading'?'Analizuję…':'')}</div>
        <div class="preview">${escapeHtml(e.text)}</div>
      </div>
      <div class="len">${wc} sł.</div>
    </div>`;
  }).join('');
  return `<div class="archive-list">${items}</div>`;
}

function renderMonthly(){
  if(state.entries.length===0){
    return `<div class="empty">
      <div class="big">📊</div>
      <h2>Brak danych</h2>
      <div>Dodaj wpisy, żeby zobaczyć statystyki miesięczne.</div>
    </div>`;
  }
  const groups = groupByMonth(state.entries);
  const cards = groups.map(g=>{
    const monthEntries = g.entries;
    const monthAnalyzed = monthEntries.filter(e=>e.status==='done' && e.analysis);
    const lengths = monthEntries.map(e=>wordCount(e.text));
    const avgLen = lengths.length ? Math.round(lengths.reduce((a,b)=>a+b,0)/lengths.length) : 0;
    const totalLen = lengths.reduce((a,b)=>a+b,0);
    const domMood = mostCommon(monthAnalyzed.map(e=>e.analysis.mood));
    const domTopic = mostCommon(monthAnalyzed.map(e=>e.analysis.topic));
    return `<div class="month-card">
      <div class="month-title">${monthLabel(g.key)}</div>
      <div class="month-stats">
        <div>
          <div class="mstat-label">Liczba wpisów</div>
          <div class="mstat-val">${monthEntries.length}</div>
        </div>
        <div>
          <div class="mstat-label">Średnia długość wpisu</div>
          <div class="mstat-val">${avgLen} sł.</div>
        </div>
        <div>
          <div class="mstat-label">Łączna liczba słów</div>
          <div class="mstat-val">${totalLen} sł.</div>
        </div>
        <div>
          <div class="mstat-label">Czujesz się głównie</div>
          <div class="mstat-val">${domMood?`<span class="emo">${domMood.emoji}</span>${domMood.label}`:'—'}</div>
        </div>
        <div>
          <div class="mstat-label">Myślisz głównie o</div>
          <div class="mstat-val">${domTopic?`<span class="emo">${domTopic.emoji}</span>${domTopic.label}`:'—'}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  return cards;
}

function renderCalendar(){
  const [y,m] = state.calendarMonth.split('-').map(Number);
  const first = new Date(y, m-1, 1);
  const startWeekday = (first.getDay()+6)%7; // Pn=0
  const daysInMonth = new Date(y, m, 0).getDate();
  const todayISO = todayStr();

  const entryMap = {};
  state.entries.forEach(e=>{ entryMap[e.date] = { over: wordCount(e.text) > WORD_LIMIT }; });

  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const info = entryMap[dateStr];
    const isFuture = dateStr > todayISO;
    const isToday = dateStr === todayISO;
    let cls = 'cal-cell';
    if(info) cls += info.over ? ' has-entry over' : ' has-entry under';
    if(isToday) cls += ' today';
    if(isFuture) cls += ' future';
    const attrs = !isFuture ? `data-action="cal-day" data-date="${dateStr}"` : '';
    cells += `<div class="${cls}" ${attrs}>${day}</div>`;
  }

  const monthLbl = first.toLocaleDateString('pl-PL',{month:'long',year:'numeric'});

  return `
    <div class="calendar">
      <div class="cal-head">
        <button class="cal-nav" data-action="cal-prev">‹</button>
        <div class="cal-month">${monthLbl}</div>
        <button class="cal-nav" data-action="cal-next">›</button>
      </div>
      <div class="cal-grid cal-weekdays">
        <div>Pn</div><div>Wt</div><div>Śr</div><div>Cz</div><div>Pt</div><div>So</div><div>Nd</div>
      </div>
      <div class="cal-grid">${cells}</div>
      <div class="cal-legend">
        <div class="row"><span class="dot under"></span>poniżej ${WORD_LIMIT} słów</div>
        <div class="row"><span class="dot over"></span>powyżej ${WORD_LIMIT} słów</div>
      </div>
    </div>`;
}

function renderStreakBanner(){
  const streak = computeStreak();
  let msg;
  if(streak===0) msg = 'Zacznij dziś swoją passę!';
  else if(streak===1) msg = 'Dzień 1 — dobry początek!';
  else msg = `${streak} dni z rzędu — tak trzymaj!`;
  return `<div class="streak-banner">
    <span class="streak-flame">🔥</span>
    <span class="streak-num">${streak}</span>
    <span class="streak-msg">${msg}</span>
  </div>`;
}

function openForm(prefillDate){
  const date = prefillDate || todayStr();
  const existing = state.entries.find(e=>e.date===date);
  state.formOpen = true;
  state.view = 'day';
  state.formDate = date;
  state.formText = existing ? existing.text : '';
  state.confettiShown = wordCount(state.formText) >= WORD_LIMIT;
  render();
}

function bindTextareaEvents(){
  const dateInp = document.getElementById('entry-date');
  const ta = document.getElementById('entry-text');
  if(dateInp){
    dateInp.addEventListener('change', ()=>{
      const d = dateInp.value;
      const existing = state.entries.find(e=>e.date===d);
      const note = document.getElementById('edit-note');
      if(ta) ta.value = existing ? existing.text : '';
      if(note) note.style.display = existing ? 'block' : 'none';
      state.confettiShown = existing ? wordCount(existing.text) >= WORD_LIMIT : false;
      updateWordCount();
    });
  }
  if(ta){
    ta.addEventListener('input', updateWordCount);
    updateWordCount();
    ta.focus();
  }
}

function updateWordCount(){
  const ta = document.getElementById('entry-text');
  const counter = document.getElementById('word-counter');
  if(!ta || !counter) return;
  const wc = wordCount(ta.value);
  counter.textContent = `${wc} ${wc===1?'słowo':(wc>=2&&wc<=4?'słowa':'słów')}`;
  counter.classList.toggle('over-limit', wc>=WORD_LIMIT);
  if(wc>=WORD_LIMIT && !state.confettiShown){
    state.confettiShown = true;
    fireConfetti(document.getElementById('textarea-wrap'));
  }
  if(wc<WORD_LIMIT){ state.confettiShown = false; }
}

function render(){
  const app = document.getElementById('app');
  const entries = state.entries;
  const idx = selectedIndex();
  const selected = idx>=0 ? entries[idx] : null;

  if(!state.calendarMonth) state.calendarMonth = todayStr().slice(0,7);

  const viewSwitchHtml = `
    <div class="view-switch">
      <button class="view-btn ${state.view==='day'?'active':''}" data-action="view-day">Dzień</button>
      <button class="view-btn ${state.view==='archive'?'active':''}" data-action="view-archive">Archiwum</button>
      <button class="view-btn ${state.view==='monthly'?'active':''}" data-action="view-monthly">Statystyki miesięczne</button>
    </div>`;

  let mainInner;
  if(state.view==='archive'){
    mainInner = `${viewSwitchHtml}${renderArchive()}`;
  } else if(state.view==='monthly'){
    mainInner = `${viewSwitchHtml}${renderMonthly()}`;
  } else {
    let body;
    if(state.formOpen){
      const existingForDate = state.entries.find(e=>e.date===state.formDate);
      body = `
        <div class="entry-form">
          <label>Data wpisu</label>
          <input type="date" id="entry-date" value="${state.formDate}" max="${todayStr()}">
          <div id="edit-note" class="edit-note" style="display:${existingForDate?'block':'none'}">Na ten dzień masz już wpis — edytujesz go.</div>
          <label>Treść wpisu</label>
          <div id="textarea-wrap" class="textarea-wrap">
            <textarea id="entry-text" placeholder="Napisz, co dziś czujesz i o czym myślisz…">${escapeHtml(state.formText)}</textarea>
          </div>
          <div class="word-counter-row"><span id="word-counter">0 słów</span></div>
          <div class="form-actions">
            <button class="btn secondary" data-action="cancel-form">Anuluj</button>
            <button class="btn" data-action="submit-form">Dodaj wpis</button>
          </div>
        </div>`;
    } else if(!selected){
      body = `<div class="empty">
        <div class="big">📔</div>
        <h2>Brak wpisów</h2>
        <div>Dodaj pierwszy wpis, żeby zobaczyć analizę dnia.</div>
        <div style="margin-top:18px;"><button class="btn" data-action="open-form">+ Nowy wpis</button></div>
      </div>`;
    } else {
      body = renderDashboard(selected);
    }

    const navHtml = (!state.formOpen && selected) ? `
      <div class="nav-row">
        <button class="nav-btn" data-action="prev" ${idx<=0?'disabled':''}>◀◀</button>
        <div class="nav-date">${fmtDate(selected.date)}</div>
        <button class="nav-btn" data-action="next" ${idx>=entries.length-1?'disabled':''}>▶▶</button>
      </div>` : '';

    const addBtnHtml = !state.formOpen ? `<div style="text-align:right;margin-bottom:10px;"><button class="add-btn" data-action="open-form">+ Nowy wpis</button></div>` : '';

    mainInner = `${viewSwitchHtml}${addBtnHtml}${body}${navHtml}`;
  }

  app.innerHTML = `
    <div class="masthead">
      <h1>Poranne Strony</h1>
      <div class="sub">${entries.length} ${entries.length===1?'wpis':'wpisów'}</div>
    </div>
    ${renderStreakBanner()}
    <div class="app-shell">
      <aside class="sidebar">${renderCalendar()}</aside>
      <div class="main">${mainInner}</div>
    </div>
  `;

  app.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', onAction);
  });

  if(state.view==='day' && state.formOpen){
    bindTextareaEvents();
  }
}

function onAction(e){
  const action = e.currentTarget.dataset.action;
  const id = e.currentTarget.dataset.id;
  const date = e.currentTarget.dataset.date;

  if(action==='select'){ state.selectedId = id; state.formOpen=false; render(); }
  else if(action==='view-day'){ state.view='day'; state.formOpen=false; render(); }
  else if(action==='view-archive'){ state.view='archive'; render(); }
  else if(action==='view-monthly'){ state.view='monthly'; render(); }
  else if(action==='open-entry'){ state.selectedId=id; state.view='day'; state.formOpen=false; render(); }
  else if(action==='open-form'){ openForm(); }
  else if(action==='edit-entry'){ openForm(date); }
  else if(action==='cancel-form'){ state.formOpen=false; render(); }
  else if(action==='submit-form'){
    const d = document.getElementById('entry-date').value || todayStr();
    const text = document.getElementById('entry-text').value.trim();
    if(!text) return;
    if(d > todayStr()) return;
    addOrUpdateEntry(d, text);
  }
  else if(action==='retry'){
    const entry = state.entries.find(x=>x.id===id);
    if(entry) analyzeEntry(entry);
  }
  else if(action==='prev'){
    const idx = selectedIndex();
    if(idx>0){ state.selectedId = state.entries[idx-1].id; render(); }
  }
  else if(action==='next'){
    const idx = selectedIndex();
    if(idx < state.entries.length-1){ state.selectedId = state.entries[idx+1].id; render(); }
  }
  else if(action==='cal-prev' || action==='cal-next'){
    let [y,m] = state.calendarMonth.split('-').map(Number);
    m += action==='cal-prev' ? -1 : 1;
    if(m<1){m=12;y--;} if(m>12){m=1;y++;}
    state.calendarMonth = `${y}-${String(m).padStart(2,'0')}`;
    render();
  }
  else if(action==='cal-day'){
    const existing = state.entries.find(x=>x.date===date);
    if(existing){ state.selectedId=existing.id; state.view='day'; state.formOpen=false; render(); }
    else { openForm(date); }
  }
}

function renderLock(error){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="masthead"><h1>Poranne Strony</h1></div>
    <div class="lock-wrap">
      <label>Hasło dostępu</label>
      <input type="password" id="lock-pass" placeholder="Wpisz hasło">
      ${error?`<div class="err">${error}</div>`:''}
      <div class="form-actions"><button class="btn" data-action="unlock">Wejdź</button></div>
    </div>
  `;
  app.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click', ()=>tryUnlock()));
  const inp = document.getElementById('lock-pass');
  if(inp){
    inp.focus();
    inp.addEventListener('keydown', ev=>{ if(ev.key==='Enter') tryUnlock(); });
  }
}

async function tryUnlock(){
  const inp = document.getElementById('lock-pass');
  const pw = inp ? inp.value : '';
  document.getElementById('app').innerHTML = `<div class="loading">Sprawdzam hasło…</div>`;
  const ok = await loadFromStorage(pw);
  if(ok){
    setPassword(pw);
    openForm();
  }else{
    renderLock('Nieprawidłowe hasło.');
  }
}

(async function init(){
  const cached = getPassword();
  if(cached){
    document.getElementById('app').innerHTML = `<div class="loading">Wczytuję…</div>`;
    const ok = await loadFromStorage(cached);
    if(ok){
      openForm();
      return;
    }
  }
  renderLock();
})();
</script>
